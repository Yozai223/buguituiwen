<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不规推文 - 耽美小说精选</title>
    <style>
        :root {
            --bg: #f7f0f2;
            --card-bg: #ffffff;
            --card-shadow: rgba(180, 148, 155, 0.18);
            --accent: #c8a5ae;
            --accent-deep: #9b7b84;
            --accent-light: #f0e4e7;
            --border: #e8d8db;
            --text: #4a3b3e;
            --text-light: #8b7b7e;
            --text-muted: #b5a3a7;
            --radius: 14px;
            --transition: 0.25s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(ellipse at 20% 10%, rgba(210, 175, 182, 0.2) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 85%, rgba(200, 165, 174, 0.15) 0%, transparent 55%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.7;
            min-height: 100vh;
            padding: 20px 16px 60px;
        }

        .main-container {
            max-width: 720px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 36px 20px 10px;
            position: relative;
        }
        .header::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 18px auto 0;
            border-radius: 2px;
        }
        .page-title {
            font-family: 'Noto Serif SC', 'STSong', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-deep);
            letter-spacing: 0.06em;
            outline: none;
            border-radius: 6px;
            padding: 4px 12px;
            display: inline-block;
            user-select: none;
        }
        .page-subtitle {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-top: 6px;
            outline: none;
        }
        .stats-bar {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            letter-spacing: 0.02em;
        }
        /* 搜索栏样式 */
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }
        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
        }
        .search-input {
            width: 100%;
            padding: 10px 40px 10px 16px;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            background: var(--card-bg);
            font-size: 0.9rem;
            outline: none;
            color: var(--text);
            transition: border-color var(--transition), box-shadow var(--transition);
            font-family: inherit;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(200, 165, 174, 0.15);
        }
        .search-input::placeholder {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
            line-height: 1;
            padding: 4px;
        }
        .search-clear.visible {
            display: block;
        }
        .search-clear:hover {
            color: var(--accent-deep);
        }

        /* 分页导航 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 22px;
            flex-wrap: wrap;
        }
        .pagination-btn {
            padding: 6px 16px;
            border-radius: 18px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all var(--transition);
            font-family: inherit;
            user-select: none;
        }
        .pagination-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent-deep);
            background: #fefbfc;
        }
        .pagination-btn:disabled {
            opacity: 0.4;
            cursor: default;
            background: #f9f5f6;
        }
        .pagination-info {
            font-size: 0.82rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 22px 24px 20px;
            box-shadow: 0 2px 12px var(--card-shadow), 0 0 0 1px rgba(220, 195, 200, 0.25);
            position: relative;
            transition: box-shadow var(--transition), transform var(--transition);
        }
        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 18px;
            bottom: 18px;
            width: 4px;
            background: linear-gradient(180deg, var(--accent), var(--accent-light));
            border-radius: 0 3px 3px 0;
            opacity: 0.7;
        }
        .card-title-row {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 6px;
            padding-right: 34px;
        }
        .card-book-title {
            font-family: 'Noto Serif SC', 'STSong', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-deep);
        }
        .card-author {
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .card-tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
            align-items: center;
        }
        .card-tags-editable {
            background: #f2e6e9;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.82rem;
            color: var(--accent-deep);
        }
        .card-rating-row {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-rating-editable {
            font-size: 0.95rem;
            color: #c8945a;
        }
        .card-divider {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent 70%);
            margin: 12px 0;
        }
        .card-review {
            font-size: 0.93rem;
            line-height: 1.8;
        }
        .card-note-row {
            margin-top: 10px;
            display: flex;
            align-items: flex-start;
            gap: 6px;
            font-size: 0.84rem;
        }
        .card-note-icon {
            color: var(--accent);
        }

        /* 编辑模式专属样式 */
        .edit-mode .page-title {
            cursor: pointer;
            background: rgba(200, 165, 174, 0.03);
        }
        .edit-mode .page-title:hover {
            background: rgba(200, 165, 174, 0.08);
        }
        .edit-mode [contenteditable="true"] {
            border-radius: 4px;
            padding: 2px 6px;
            transition: background var(--transition);
            cursor: text;
            outline: none;
        }
        .edit-mode [contenteditable="true"]:hover {
            background: rgba(200, 165, 174, 0.06);
        }
        .edit-mode [contenteditable="true"]:focus {
            background: rgba(200, 165, 174, 0.12);
        }
        .card-delete-btn,
        .add-card-btn,
        .footer-tools {
            display: none;
        }
        .edit-mode .card-delete-btn,
        .edit-mode .add-card-btn,
        .edit-mode .footer-tools {
            display: flex;
        }
        .card-delete-btn {
            position: absolute;
            top: 14px;
            right: 16px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        .card-delete-btn:hover {
            background: #fef5f6;
            border-color: #f0d0d4;
            color: #d4848f;
        }
        .add-card-btn {
            width: 100%;
            padding: 18px 20px;
            background: var(--card-bg);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--accent);
            font-size: 1rem;
            margin-top: 18px;
            justify-content: center;
            gap: 8px;
        }
        .footer-tools {
            justify-content: center;
            gap: 16px;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        .footer-btn {
            padding: 9px 20px;
            border-radius: 22px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        /* 导入提示 */
        .import-hint {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0.7;
        }
        .import-hint:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* 密码弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: white;
            padding: 28px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 280px;
        }
        .modal-box input {
            width: 100%;
            padding: 10px;
            margin: 16px 0;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
        }
        .modal-box button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 22px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .no-result {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="main-container" id="mainContainer">
        <header class="header">
            <h1 class="page-title" id="pageTitle">不规推文</h1>
            <p class="page-subtitle" id="pageSubtitle">耽美小说精选推荐 · 纯文字推文</p>
        </header>

        <!-- 搜索栏 -->
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索书名、作者、标签...">
                <button class="search-clear" id="searchClear">✕</button>
            </div>
        </div>

        <div class="stats-bar" id="statsBar">共 <span id="cardCount">0</span> 篇推文</div>

        <div class="cards-list" id="cardsList"></div>

        <!-- 分页导航 -->
        <div class="pagination" id="pagination">
            <button class="pagination-btn" id="prevPageBtn" disabled>← 上一页</button>
            <span class="pagination-info" id="pageInfo">第 1/1 页</span>
            <button class="pagination-btn" id="nextPageBtn" disabled>下一页 →</button>
        </div>

        <button class="add-card-btn" id="addCardBtn">+ 添加新推文</button>
        <div class="footer-tools">
            <button class="footer-btn" id="exportBtn">📋 复制全部</button>
            <button class="footer-btn" id="exportJsonBtn">📤 导出数据</button>
            <button class="footer-btn" id="resetBtn">🔄 恢复默认</button>
            <button class="footer-btn" id="exitEditBtn">🔒 退出编辑</button>
        </div>
        <div class="import-hint" id="importHint">📥 导入推文数据</div>
    </div>

    <!-- 密码弹窗 -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-box">
            <p style="color:var(--accent-deep); font-weight:600;">🔐 管理员验证</p>
            <input type="password" id="passwordInput" placeholder="请输入编辑密码" autofocus>
            <button id="confirmPasswordBtn">确 认</button>
        </div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'lotus_ouhe_edit_mode_v3';
            const DEFAULT_PASSWORD = 'ouhe2026';
            const CARDS_PER_PAGE = 23;

            const defaultData = {
                pageTitle: '不规推文',
                pageSubtitle: '耽美小说精选推荐 · 纯文字推文',
                cards: [
                    { id: 1, title: '《山河令》', author: 'Priest', tags: '古风, 江湖, HE, 强强', rating: '★★★★★', review: '经典古风武侠耽美，温周绝美爱情。', note: '经典必读' },
                    { id: 2, title: '《全球高考》', author: '木苏里', tags: '无限流, 现代, HE', rating: '★★★★★', review: '无限流与感情线结合典范，烧脑又甜宠。', note: '强推' }
                ]
            };

            let appData = JSON.parse(JSON.stringify(defaultData));
            let isEditMode = false;
            let searchQuery = '';
            let currentPage = 1;

            // DOM元素
            const mainContainer = document.getElementById('mainContainer');
            const pageTitleEl = document.getElementById('pageTitle');
            const pageSubtitleEl = document.getElementById('pageSubtitle');
            const cardsListEl = document.getElementById('cardsList');
            const cardCountEl = document.getElementById('cardCount');
            const addCardBtn = document.getElementById('addCardBtn');
            const exportBtn = document.getElementById('exportBtn');
            const exportJsonBtn = document.getElementById('exportJsonBtn');
            const resetBtn = document.getElementById('resetBtn');
            const exitEditBtn = document.getElementById('exitEditBtn');
            const importHint = document.getElementById('importHint');
            const passwordModal = document.getElementById('passwordModal');
            const passwordInput = document.getElementById('passwordInput');
            const confirmPasswordBtn = document.getElementById('confirmPasswordBtn');
            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            const statsBar = document.getElementById('statsBar');
            const prevPageBtn = document.getElementById('prevPageBtn');
            const nextPageBtn = document.getElementById('nextPageBtn');
            const pageInfo = document.getElementById('pageInfo');

            // 加载本地存储数据
            function loadLocalData() {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    try { return JSON.parse(raw); } catch (e) {}
                }
                return null;
            }

            function saveLocalData(data) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            const localData = loadLocalData();
            if (localData) {
                appData = localData;
            }

            function escape(str) {
                const d = document.createElement('div');
                d.textContent = str;
                return d.innerHTML;
            }

            // 获取过滤后的卡片
            function getFilteredCards() {
                if (!searchQuery.trim()) {
                    return appData.cards;
                }
                const q = searchQuery.trim().toLowerCase();
                return appData.cards.filter(card => {
                    const fields = [
                        card.title,
                        card.author,
                        card.tags,
                        card.rating,
                        card.review,
                        card.note || ''
                    ];
                    return fields.some(f => f.toLowerCase().includes(q));
                });
            }

            // 计算总页数
            function getTotalPages(filteredCards) {
                return Math.max(1, Math.ceil(filteredCards.length / CARDS_PER_PAGE));
            }

            // 获取当前页卡片
            function getCurrentPageCards(filteredCards) {
                const totalPages = getTotalPages(filteredCards);
                if (currentPage > totalPages) {
                    currentPage = totalPages;
                }
                const start = (currentPage - 1) * CARDS_PER_PAGE;
                return filteredCards.slice(start, start + CARDS_PER_PAGE);
            }

            // 更新分页按钮状态
            function updatePagination(filteredCards) {
                const totalPages = getTotalPages(filteredCards);
                pageInfo.textContent = `第 ${currentPage}/${totalPages} 页`;
                prevPageBtn.disabled = currentPage <= 1;
                nextPageBtn.disabled = currentPage >= totalPages;
            }

            // 渲染页面
            function render() {
                pageTitleEl.textContent = appData.pageTitle;
                pageSubtitleEl.textContent = appData.pageSubtitle;
                document.title = appData.pageTitle || '不规推文';

                const filteredCards = getFilteredCards();
                const totalFiltered = filteredCards.length;
                const totalPages = getTotalPages(filteredCards);

                // 确保当前页有效
                if (currentPage > totalPages) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;

                const pageCards = getCurrentPageCards(filteredCards);

                // 统计栏
                if (searchQuery.trim() && totalFiltered !== appData.cards.length) {
                    statsBar.innerHTML = `搜索到 <span id="cardCount">${totalFiltered}</span> 篇推文 (共 ${appData.cards.length} 篇) · 第 ${currentPage}/${totalPages} 页`;
                } else {
                    statsBar.innerHTML = `共 <span id="cardCount">${appData.cards.length}</span> 篇推文 · 第 ${currentPage}/${totalPages} 页`;
                }

                // 渲染卡片
                if (pageCards.length === 0) {
                    cardsListEl.innerHTML = '<div class="no-result">📭 没有找到匹配的推文</div>';
                } else {
                    cardsListEl.innerHTML = pageCards.map(card => `
                        <div class="card" data-card-id="${card.id}">
                            <button class="card-delete-btn" data-action="delete" data-id="${card.id}">✕</button>
                            <div class="card-title-row">
                                <span class="card-book-title" ${isEditMode ? 'contenteditable="true"' : ''} data-field="title" data-id="${card.id}">${escape(card.title)}</span>
                                <span style="color:var(--text-muted);">作者：</span>
                                <span class="card-author" ${isEditMode ? 'contenteditable="true"' : ''} data-field="author" data-id="${card.id}">${escape(card.author)}</span>
                            </div>
                            <div class="card-tags-row">
                                <span>🏷️</span>
                                <span class="card-tags-editable" ${isEditMode ? 'contenteditable="true"' : ''} data-field="tags" data-id="${card.id}">${escape(card.tags)}</span>
                            </div>
                            <div class="card-rating-row">
                                <span>推荐：</span>
                                <span class="card-rating-editable" ${isEditMode ? 'contenteditable="true"' : ''} data-field="rating" data-id="${card.id}">${escape(card.rating)}</span>
                            </div>
                            <hr class="card-divider">
                            <div class="card-review" ${isEditMode ? 'contenteditable="true"' : ''} data-field="review" data-id="${card.id}">${escape(card.review)}</div>
                            <div class="card-note-row">
                                <span class="card-note-icon">💡</span>
                                <span ${isEditMode ? 'contenteditable="true"' : ''} data-field="note" data-id="${card.id}">${escape(card.note || '')}</span>
                            </div>
                        </div>
                    `).join('');
                }

                updatePagination(filteredCards);

                // 编辑模式样式切换
                if (isEditMode) {
                    mainContainer.classList.add('edit-mode');
                } else {
                    mainContainer.classList.remove('edit-mode');
                }
            }

            // 更新卡片字段
            function updateField(cardId, field, value) {
                const card = appData.cards.find(c => c.id == cardId);
                if (card) {
                    card[field] = value;
                    saveLocalData(appData);
                }
            }

            // 进入/退出编辑模式
            function enterEditMode() {
                isEditMode = true;
                render();
                passwordModal.style.display = 'none';
            }

            function exitEditMode() {
                isEditMode = false;
                render();
            }

            // 标题三击进入编辑模式验证
            let titleClickTimer;
            pageTitleEl.addEventListener('click', function(e) {
                if (isEditMode) return;
                if (!titleClickTimer) {
                    titleClickTimer = setTimeout(() => { titleClickTimer = null; }, 800);
                } else {
                    clearTimeout(titleClickTimer);
                    titleClickTimer = null;
                    passwordModal.style.display = 'flex';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            });

            confirmPasswordBtn.addEventListener('click', function() {
                if (passwordInput.value === DEFAULT_PASSWORD) {
                    enterEditMode();
                } else {
                    alert('密码错误');
                }
            });
            passwordInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') confirmPasswordBtn.click();
            });
            passwordModal.addEventListener('click', function(e) {
                if (e.target === passwordModal) passwordModal.style.display = 'none';
            });

            exitEditBtn.addEventListener('click', exitEditMode);

            // 搜索输入监听
            searchInput.addEventListener('input', function() {
                searchQuery = searchInput.value;
                if (searchQuery.trim()) {
                    searchClear.classList.add('visible');
                } else {
                    searchClear.classList.remove('visible');
                }
                currentPage = 1; // 搜索重置到第一页
                render();
            });

            // 清除搜索
            searchClear.addEventListener('click', function() {
                searchInput.value = '';
                searchQuery = '';
                searchClear.classList.remove('visible');
                currentPage = 1;
                render();
                searchInput.focus();
            });

            // 分页按钮事件
            prevPageBtn.addEventListener('click', function() {
                if (currentPage > 1) {
                    currentPage--;
                    render();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            nextPageBtn.addEventListener('click', function() {
                const filteredCards = getFilteredCards();
                const totalPages = getTotalPages(filteredCards);
                if (currentPage < totalPages) {
                    currentPage++;
                    render();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            // 删除卡片
            document.addEventListener('click', function(e) {
                if (!isEditMode) return;
                const delBtn = e.target.closest('[data-action="delete"]');
                if (delBtn) {
                    const id = parseInt(delBtn.getAttribute('data-id'));
                    const card = appData.cards.find(c => c.id === id);
                    if (card && confirm(`确定要删除「${card.title || '未命名'}」这篇推文吗？`)) {
                        appData.cards = appData.cards.filter(c => c.id !== id);
                        saveLocalData(appData);
                        // 如果当前页无数据自动退到上一页
                        const filteredCards = getFilteredCards();
                        const totalPages = getTotalPages(filteredCards);
                        if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
                        render();
                    }
                }
            });

            // 编辑失焦保存
            document.addEventListener('focusout', function(e) {
                if (!isEditMode) return;
                const el = e.target;
                const cardId = el.getAttribute('data-id');
                const field = el.getAttribute('data-field');
                if (cardId && field) {
                    updateField(cardId, field, el.textContent.trim());
                }
                if (el.id === 'pageTitle') {
                    appData.pageTitle = el.textContent.trim() || '不规推文';
                    saveLocalData(appData);
                    document.title = appData.pageTitle;
                }
                if (el.id === 'pageSubtitle') {
                    appData.pageSubtitle = el.textContent.trim();
                    saveLocalData(appData);
                }
            });

            // 添加卡片
            addCardBtn.addEventListener('click', function() {
                if (!isEditMode) return;
                const newId = Math.max(0, ...appData.cards.map(c => c.id)) + 1;
                appData.cards.push({ id: newId, title: '', author: '', tags: '', rating: '★★★★☆', review: '', note: '' });
                saveLocalData(appData);
                // 添加后跳转到最后一页
                const filteredCards = getFilteredCards();
                const totalPages = getTotalPages(filteredCards);
                currentPage = totalPages;
                render();
            });

            // 复制全部推文文本
            exportBtn.addEventListener('click', function() {
                const cardsToExport = searchQuery.trim() ? getFilteredCards() : appData.cards;
                let text = `【${appData.pageTitle}】\n${appData.pageSubtitle}\n${'═'.repeat(30)}\n\n`;
                cardsToExport.forEach(c => {
                    text += `📖 ${c.title}\n作者：${c.author}\n标签：${c.tags}\n推荐：${c.rating}\n推文：${c.review}\n${c.note ? '💡 '+c.note+'\n' : ''}\n${'─'.repeat(20)}\n\n`;
                });
                navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
            });

            // 导出JSON备份
            exportJsonBtn.addEventListener('click', function() {
                const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'bugui_tuiwen_backup.json';
                a.click();
            });

            // 导入JSON
            importHint.addEventListener('click', function() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        try {
                            const data = JSON.parse(ev.target.result);
                            if (data && Array.isArray(data.cards)) {
                                appData = data;
                                saveLocalData(appData);
                                currentPage = 1;
                                render();
                                alert('数据导入成功！');
                            } else {
                                alert('文件格式不正确');
                            }
                        } catch (ex) { alert('解析失败'); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            });

            // 恢复默认
            resetBtn.addEventListener('click', function() {
                if (confirm('恢复默认数据将覆盖当前内容，确定吗？')) {
                    appData = JSON.parse(JSON.stringify(defaultData));
                    saveLocalData(appData);
                    currentPage = 1;
                    render();
                }
            });

            // 初始化渲染
      render();
            isEditMode = false;
            mainContainer.classList.remove('edit-mode');
        })();
    </script>
</body>
</html>
